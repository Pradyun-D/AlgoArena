<p class="text-on-surface-variant font-mono text-sm tracking-widest uppercase">system.initialize_user_profile()</p>
</div>
<form class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">FULL_NAME</label>
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:syntax-accent text-on-surface placeholder:text-outline-variant font-body py-3 px-4 rounded-sm transition-all" placeholder="e.g. Alan Turing" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">HANDLE/USERNAME</label>
<div class="relative">
<span class="absolute left-4 top-3.5 text-primary text-sm font-mono">@</span>
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:syntax-accent text-on-surface placeholder:text-outline-variant font-body py-3 pl-8 pr-4 rounded-sm transition-all" placeholder="syntax_hero" type="text"/>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">EMAIL</label>
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:syntax-accent text-on-surface placeholder:text-outline-variant font-body py-3 px-4 rounded-sm transition-all" placeholder="dev@null.sh" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">PASSWORD</label>
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:syntax-accent text-on-surface placeholder:text-outline-variant font-body py-3 px-4 rounded-sm transition-all" placeholder="********" type="password"/>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">CONFIRM_PASSWORD</label>
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:syntax-accent text-on-surface placeholder:text-outline-variant font-body py-3 px-4 rounded-sm transition-all" placeholder="********" type="password"/>
</div>
</div>
<div class="space-y-4 pt-4">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant uppercase">PRIMARY_LANGUAGE</label>
<div class="grid grid-cols-3 gap-4">
<label class="cursor-pointer group">
<input checked="" class="hidden peer" name="lang" type="radio"/>
<div class="bg-surface-container-low peer-checked:bg-primary-container/10 peer-checked:ring-1 peer-checked:ring-primary text-center py-4 rounded-sm transition-all group-hover:bg-surface-container-high">
<p class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors">C++</p>
<p class="text-[9px] text-on-surface-variant font-mono mt-1 opacity-60">LLVM_FAST</p>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="lang" type="radio"/>
<div class="bg-surface-container-low peer-checked:bg-primary-container/10 peer-checked:ring-1 peer-checked:ring-primary text-center py-4 rounded-sm transition-all group-hover:bg-surface-container-high">
<p class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors">Python</p>
<p class="text-[9px] text-on-surface-variant font-mono mt-1 opacity-60">CYTHON_3.12</p>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="lang" type="radio"/>
<div class="bg-surface-container-low peer-checked:bg-primary-container/10 peer-checked:ring-1 peer-checked:ring-primary text-center py-4 rounded-sm transition-all group-hover:bg-surface-container-high">
<p class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors">Java</p>
<p class="text-[9px] text-on-surface-variant font-mono mt-1 opacity-60">OPENJDK_21</p>
</div>
</label>
</div>

<label class="text-xs text-on-surface-variant font-label cursor-pointer select-none" for="tos">
                                I confirm the <span class="text-secondary font-mono">TERMS_OF_SERVICE_AGREEMENT</span> and acknowledge data processing protocols.
                            </label>
</div>
