<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0b0f1a;
        --bg-2: #172238;
        --card: #101826;
        --accent: #f2b705;
        --accent-2: #4dd0e1;
        --text: #e6eef7;
        --muted: #93a1b5;
        --danger: #ff6b6b;
        --success: #5ad89f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #1b2a45 0%, transparent 55%),
          radial-gradient(circle at 80% 20%, #1a3b5d 0%, transparent 50%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .shell {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 24px;
      }

      .panel {
        background: rgba(16, 24, 38, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      .headline {
        font-size: 30px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .subline {
        color: var(--muted);
        line-height: 1.5;
      }

      .toggle {
        display: flex;
        background: #0f1726;
        border-radius: 999px;
        padding: 6px;
        margin: 20px 0;
      }

      .toggle button {
        flex: 1;
        border: 0;
        padding: 10px 12px;
        border-radius: 999px;
        font-weight: 600;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .toggle button.active {
        background: var(--accent);
        color: #101826;
      }

      form {
        display: none;
        gap: 14px;
      }

      form.active {
        display: grid;
      }

      label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0f1726;
        color: var(--text);
        font-size: 15px;
      }

      .action {
        padding: 12px 16px;
        border-radius: 12px;
        border: 0;
        background: var(--accent-2);
        color: #0b0f1a;
        font-weight: 600;
        cursor: pointer;
      }

      .social {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .social a {
        text-decoration: none;
        text-align: center;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
        font-weight: 600;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      @media (max-width: 860px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="panel">
        <div class="headline">Welcome back</div>
        <div class="subline">
          Use one page for login or registration. OAuth continues through Google.
        </div>

        <div class="toggle" role="tablist">
          <button type="button" class="active" data-target="login">Login</button>
          <button type="button" data-target="register">Register</button>
        </div>

        <form id="login" class="active">
          <div>
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" required />
          </div>
          <div>
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required />
          </div>
          <button class="action" type="submit">Sign in</button>
          <div class="status" id="login-status"></div>
        </form>

        <form id="register">
          <div>
            <label for="register-email">Email</label>
            <input id="register-email" name="email" type="email" required />
          </div>
          <div>
            <label for="register-password1">Password</label>
            <input id="register-password1" name="password1" type="password" required />
          </div>
          <div>
            <label for="register-password2">Confirm password</label>
            <input id="register-password2" name="password2" type="password" required />
          </div>
          <button class="action" type="submit">Create account</button>
          <div class="status" id="register-status"></div>
        </form>
      </section>

      <section class="panel">
        <div class="headline">Use Google</div>
        <div class="subline">
          OAuth will redirect you back here after Google completes the sign-in.
        </div>
        <div class="social">
          <a href="/accounts/google/login/?process=login">Continue with Google</a>
        </div>
      </section>
    </div>

    <script>
      const toggleButtons = document.querySelectorAll(".toggle button");
      const forms = document.querySelectorAll("form");

      toggleButtons.forEach((button) => {
        button.addEventListener("click", () => {
          toggleButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");

          forms.forEach((form) => form.classList.remove("active"));
          document.getElementById(button.dataset.target).classList.add("active");
        });
      });

      async function postForm(url, data, statusEl) {
        statusEl.textContent = "";
        statusEl.className = "status";

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify(data),
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            statusEl.classList.add("error");
            statusEl.textContent = payload.detail || "Request failed";
            return;
          }

          statusEl.classList.add("success");
          statusEl.textContent = "Success";
        } catch (error) {
          statusEl.classList.add("error");
          statusEl.textContent = "Network error";
        }
      }

      document.getElementById("login").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = {
          email: document.getElementById("login-email").value,
          password: document.getElementById("login-password").value,
        };
        postForm("/api/auth/login/", data, document.getElementById("login-status"));
      });

      document.getElementById("register").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = {
          email: document.getElementById("register-email").value,
          password1: document.getElementById("register-password1").value,
          password2: document.getElementById("register-password2").value,
        };
        postForm(
          "/api/auth/registration/",
          data,
          document.getElementById("register-status")
        );
      });
    </script>
  </body>
</html>
