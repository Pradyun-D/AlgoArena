<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0b0f1a;
        --bg-2: #172238;
        --card: #101826;
        --accent: #f2b705;
        --accent-2: #4dd0e1;
        --text: #e6eef7;
        --muted: #93a1b5;
        --danger: #ff6b6b;
        --success: #5ad89f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #1b2a45 0%, transparent 55%),
          radial-gradient(circle at 80% 20%, #1a3b5d 0%, transparent 50%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .card {
        width: min(480px, 100%);
        background: rgba(16, 24, 38, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 36px 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      .avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 600;
        color: #0b0f1a;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 4px;
      }

      .email {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 28px;
      }

      .divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.07);
        margin: 0 0 24px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        font-size: 14px;
      }
      .row:last-of-type { border-bottom: none; }

      .label { color: var(--muted); }

      .badge {
        background: rgba(242, 183, 5, 0.12);
        color: var(--accent);
        border: 1px solid rgba(242, 183, 5, 0.25);
        border-radius: 999px;
        padding: 2px 12px;
        font-size: 13px;
        font-weight: 500;
        text-transform: capitalize;
      }

      .badge.active {
        background: rgba(90, 216, 159, 0.12);
        color: var(--success);
        border-color: rgba(90, 216, 159, 0.25);
      }

      .actions {
        margin-top: 28px;
        display: flex;
        gap: 10px;
      }

      .btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: var(--accent);
        color: #0b0f1a;
      }

      .btn-ghost {
        background: rgba(255,255,255,0.05);
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .btn-ghost:hover { background: rgba(255,255,255,0.09); }
      .btn-primary:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">{{ user.email|first|upper }}</div>

      <h1>{{ user.get_full_name|default:user.email }}</h1>
      <div class="email">{{ user.email }}</div>

      <hr class="divider" />

      <div class="row">
        <span class="label">Role</span>
        <span class="badge">{{ user.role }}</span>
      </div>
      <div class="row">
        <span class="label">Account status</span>
        <span class="badge active">Active</span>
      </div>
      <div class="row">
        <span class="label">Joined</span>
        <span>{{ user.date_joined|date:"N j, Y" }}</span>
      </div>
      <div class="row">
        <span class="label">Last login</span>
        <span>{{ user.last_login|date:"N j, Y" }}</span>
      </div>

      <div class="actions">
        <a href="/accounts/password/change/" class="btn btn-ghost">Change password</a>
        <a href="/api/auth/logout/" class="btn btn-primary">Log out</a>
      </div>
    </div>
  </body>
</html>
